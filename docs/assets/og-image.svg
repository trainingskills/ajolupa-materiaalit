<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Oma Opetuslupa — opetuslupa-ajo, selkeästi hallussa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b0f17"/><stop offset="1" stop-color="#151b26"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(980 90) rotate(130) scale(560)">
      <stop stop-color="#4f46e5" stop-opacity="0.55"/><stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grad" x1="120" y1="300" x2="720" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8"/><stop offset="1" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- logo mark -->
  <g transform="translate(96 84)">
    <rect width="76" height="76" rx="20" fill="#4f46e5"/>
    <circle cx="38" cy="38" r="20" stroke="#fff" stroke-width="4.2" fill="none"/>
    <circle cx="38" cy="38" r="5.4" fill="#fff"/>
    <path d="M38 18.4V33" stroke="#fff" stroke-width="4.2" stroke-linecap="round"/>
    <path d="M21.6 48.4 33 41.2" stroke="#fff" stroke-width="4.2" stroke-linecap="round"/>
    <path d="M54.4 48.4 43 41.2" stroke="#fff" stroke-width="4.2" stroke-linecap="round"/>
  </g>
  <text x="192" y="134" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="34" font-weight="700" fill="#e8edf5">Oma Opetuslupa</text>

  <text x="96" y="300" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="#e8edf5">Opetuslupa-ajo,</text>
  <text x="96" y="392" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="76" font-weight="800" letter-spacing="-2" fill="url(#grad)">selkeästi hallussa.</text>

  <text x="98" y="462" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="400" fill="#94a3b8">Tunnit 1–10 · ajotuntien mittaus · E100 · Olli-avustaja offline</text>

  <!-- badges -->
  <g font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="24" font-weight="600" fill="#c7cede">
    <rect x="96" y="516" width="190" height="56" rx="28" fill="#1e2438"/><text x="126" y="552">Ilmainen</text>
    <rect x="306" y="516" width="248" height="56" rx="28" fill="#1e2438"/><text x="336" y="552">Yksityisyys edellä</text>
    <rect x="574" y="516" width="210" height="56" rx="28" fill="#1e2438"/><text x="604" y="552">Toimii offline</text>
  </g>

  <text x="1104" y="590" text-anchor="end" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="24" fill="#64748b">iOS · macOS · web</text>
</svg>
